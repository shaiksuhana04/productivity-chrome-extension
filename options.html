<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ProductiX Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family: Inter, system-ui, sans-serif;
}

body{
margin:0;
min-height:100vh;
padding:60px 20px;

display:flex;
justify-content:center;
align-items:flex-start;

/* ⭐ PREMIUM CALM BG */
background:
radial-gradient(circle at 15% 20%, #f0ebe7 0%, transparent 40%),
radial-gradient(circle at 85% 80%, #ece6df 0%, transparent 40%),
linear-gradient(135deg,#f7f5f2 0%, #e9eef5 100%);
}

.card{
width:760px;
background:rgba(255,255,255,0.7);
backdrop-filter: blur(30px);
border-radius:28px;
padding:48px;

box-shadow:
0 40px 80px rgba(0,0,0,0.08),
0 10px 30px rgba(0,0,0,0.05),
inset 0 1px 0 rgba(255,255,255,0.6);
}

h1{
margin:0 0 40px 0;
font-size:32px;
font-weight:700;
letter-spacing:-0.5px;
}

.section{
margin-top:34px;
}

.section-title{
font-size:18px;
font-weight:600;
margin-bottom:14px;
color:#2c2c2c;
}

select{
padding:8px 14px;
border-radius:10px;
border:1px solid #ddd;
background:white;
font-weight:500;
}

textarea{
width:100%;
height:150px;
border-radius:18px;
border:1px solid #e6e6e6;
padding:16px;
font-size:14px;
background:#fbfbfb;
}

.row{
display:flex;
gap:30px;
}

.input-group{
display:flex;
align-items:center;
gap:10px;
font-weight:500;
}

input[type="text"]{
width:90px;
padding:12px;
border-radius:12px;
border:1px solid #e6e6e6;
background:#fbfbfb;
}

.toggle{
display:flex;
justify-content:space-between;
align-items:center;
background:#fbfbfb;
padding:16px 18px;
border-radius:16px;
margin-top:12px;
}

.button-row{
display:flex;
gap:16px;
margin-top:34px;
}

.primary-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff7a5c,#ff5c3d);
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
}

.secondary-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:#ececec;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.success{
display:none;
margin-top:14px;
color:#2ecc71;
font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<h1>🍅 Focus Settings</h1>

<form id="options-form">

<div class="section">
<div class="section-title">Distracting Websites</div>

<select id="blacklist-or-whitelist">
<option>Block these sites</option>
<option>Allow only these sites</option>
</select>

<textarea id="site-list"></textarea>
</div>

<div class="section">
<div class="section-title">Timer Duration</div>

<div class="row">

<div class="input-group">
<label>Work</label>
<input id="work-duration" type="text">
<span>min</span>
</div>

<div class="input-group">
<label>Break</label>
<input id="break-duration" type="text">
<span>min</span>
</div>

</div>
</div>

<div class="section">
<div class="section-title">Behaviour</div>

<div class="toggle">
<span>Show Notification</span>
<input id="show-notifications" type="checkbox">
</div>

<div class="toggle">
<span>Play Alarm Sound</span>
<input id="should-ring" type="checkbox">
</div>

<div class="toggle">
<span>Click Restarts Timer</span>
<input id="click-restarts" type="checkbox">
</div>

</div>

<div class="button-row">
<button class="primary-btn" type="submit">Save Settings</button>
<button class="secondary-btn" id="reset-btn" type="button">Reset Default</button>
</div>

<div id="save-successful" class="success">Saved ✓</div>

</form>

</div>

<script src="options.js"></script>

</body>
</html>
